copies        = 1
iterations    = 1
ext           = gcc
makeflags     = -j32
output_format = csv
runlist       = int fp
strict_rundir_verify        = 0

# -s 1024M: 410.bwaves 等の ref で shell_lam の巨大局所配列用（デフォルト 8MB では SIGSEGV）
monitor_wrapper         = qemu-riscv64 -s 1024M -L /riscv-linux/sysroot $command

default:
    CC                  = riscv64-unknown-linux-gnu-gcc -std=gnu89
    CXX                 = riscv64-unknown-linux-gnu-g++
    FC                  = riscv64-unknown-linux-gnu-gfortran

    CC_VERSION_OPTION   = --version
    CXX_VERSION_OPTION  = --version
    FC_VERSION_OPTION   = --version

default:
    # Language-specific OPTIMIZE only (no global OPTIMIZE), so C-only flags are not passed to gfortran
    COPTIMIZE            = -g -Ofast -funroll-loops -flto -flto-partition=one -fno-builtin-memcpy -fno-builtin-memmove
    CXXOPTIMIZE          = -g -Ofast -funroll-loops -flto -flto-partition=one -fno-builtin-memcpy -fno-builtin-memmove
    FOPTIMIZE            = -g -Ofast -funroll-loops -flto

    EXTRA_OPTIMIZE      = -mabi=lp64d
    EXTRA_FFLAGS        = -mabi=lp64d
    PORTABILITY         = -DSPEC_CPU_LP64
    FPORTABILITY        = -DSPEC_CPU_LP64
    LDCXXFLAGS          = -Wl,--allow-multiple-definition

int=base:
    EXTRA_CFLAGS   = -fno-strict-aliasing -Wno-int-conversion -Wno-implicit-function-declaration -Wno-incompatible-pointer-types
    EXTRA_CXXFLAGS = -Wno-reserved-user-defined-literal -Wno-c++11-narrowing -Wno-template-body

447.dealII=default=default=default:
    # ISO C++ forbids comparison between pointer and integer (parameter_handler.cc) を警告に落とす
    EXTRA_CXXFLAGS = -Wno-reserved-user-defined-literal -Wno-c++11-narrowing -Wno-template-body -fpermissive

400.perlbench=default=default=default:
    CPORTABILITY   = -DSPEC_CPU_LINUX_X64

462.libquantum=default=default=default:
    CPORTABILITY   = -DSPEC_CPU_LINUX

464.h264ref=default=default=default:
    PORTABILITY    = -fsigned-char

483.xalancbmk=default=default=default:
    CXXPORTABILITY = -DSPEC_CPU_LINUX

416.gamess=default=default=default:
    EXTRA_FFLAGS   = -std=legacy

450.soplex=default=default=default:
    CXXPORTABILITY = -std=gnu++98

481.wrf=default=default=default:
    EXTRA_FFLAGS   = -std=legacy -fallow-argument-mismatch
    # 同梱 NetCDF の C が gfortran と一致するようアンダースコア付きシンボル (nf_strerror_ 等) を出す
    CPORTABILITY   = -DSPEC_CPU_CASE_FLAG
    # LTO を無効化: 同梱 NetCDF の C グルーが LTO リンクで解決されず undefined reference になるため
    FOPTIMIZE      = -g -O3 -funroll-loops
    COPTIMIZE      = -g -O3 -funroll-loops -fno-builtin-memcpy -fno-builtin-memmove
    CXXOPTIMIZE    = -g -O3 -funroll-loops -fno-builtin-memcpy -fno-builtin-memmove
    EXTRA_CFLAGS   = -fno-strict-aliasing
